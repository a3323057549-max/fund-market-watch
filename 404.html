<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#0f172a" />
  <title>基估宝已停用</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.2), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(34, 197, 94, 0.16), transparent 28%),
        #0f172a;
    }

    main {
      width: min(560px, 100%);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 18px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.82);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.34);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 12px;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.75;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
      font-size: 14px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
    }

    .muted {
      margin-top: 20px;
      color: #94a3b8;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot"></span>已停止服务</div>
    <h1>基估宝已停用</h1>
    <p>这个自建基金估值页面已停止使用，不再展示持仓、收益或估值数据。</p>
    <p>后续基金账户、持仓金额、收益结算和买卖判断，以天天基金官方账户数据和本地 ttskill 查询结果为准。</p>
    <p class="muted">Stopped by Codex on 2026-06-29.</p>
  </main>
</body>
</html>
